<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bob檔案高速傳輸系統</title>
    <!-- 引入 Tailwind CSS 提供極簡現代化 UI -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 QRious 用於生成高品質 QR Code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <!-- 引入 jsQR 用於相機即時解析 QR Code -->
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandBlue: '#3b82f6',
                        brandGreen: '#10b981',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #000000;
            overflow-x: hidden;
        }
        /* 掃描線動畫效果 */
        @keyframes scan {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(220px); }
        }
        .scan-line {
            animation: scan 2s infinite ease-in-out;
        }
    </style>
</head>
<body class="text-slate-200 font-sans min-h-screen flex flex-col justify-between selection:bg-blue-500/30">

    <!-- 頂部空白間距 -->
    <div></div>

    <!-- 主要內容區：集中於中心 -->
    <main class="max-w-md w-full mx-auto px-6 py-8 flex flex-col items-center justify-center space-y-8">
        
        <!-- 標頭：Bob檔案高速傳輸系統 -->
        <header class="text-center space-y-1">
            <h1 class="font-black text-2xl tracking-widest bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">
                Bob檔案高速傳輸系統
            </h1>
            <p class="text-[10px] text-slate-600 tracking-widest uppercase">WebRTC Direct P2P Pipe</p>
        </header>

        <!-- 第一步：建立連線控制面板 -->
        <div class="w-full flex flex-col items-center space-y-6">
            
            <!-- 角色選擇：雙圖標大按鈕 -->
            <div id="setup-view" class="grid grid-cols-2 gap-4 w-full">
                <!-- 發起者按鈕 -->
                <button id="btn-role-host" onclick="initHost()" class="group flex flex-col items-center justify-center p-6 rounded-2xl bg-slate-950 border border-slate-900 hover:border-blue-500/40 hover:bg-slate-900/40 transition-all duration-300 space-y-3">
                    <div class="p-3 bg-blue-500/10 text-blue-400 rounded-xl group-hover:scale-110 transition-transform duration-300">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h.01M16 12h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <span class="text-sm font-bold text-slate-300 tracking-wider">發起傳輸</span>
                </button>
                
                <!-- 接收者按鈕 -->
                <button id="btn-role-joiner" onclick="startJoinerScanner()" class="group flex flex-col items-center justify-center p-6 rounded-2xl bg-slate-950 border border-slate-900 hover:border-emerald-500/40 hover:bg-slate-900/40 transition-all duration-300 space-y-3">
                    <div class="p-3 bg-emerald-500/10 text-emerald-400 rounded-xl group-hover:scale-110 transition-transform duration-300">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                    </div>
                    <span class="text-sm font-bold text-slate-300 tracking-wider">接收檔案</span>
                </button>
            </div>

            <!-- 信令交換流程 UI -->
            <div id="signaling-box" class="hidden w-full transition-all duration-300">
                <!-- 發起者展示極簡 QR Code -->
                <div id="host-panel" class="hidden flex flex-col items-center space-y-4">
                    <div class="bg-slate-950 p-4 rounded-2xl border border-slate-900 flex flex-col items-center shadow-2xl">
                        <canvas id="qr-canvas" class="bg-white p-2.5 rounded-xl"></canvas>
                        <p id="room-url-display" class="text-[9px] text-slate-600 mt-3 font-mono break-all text-center max-w-[200px]">網址同步中...</p>
                    </div>
                    <p class="text-xs text-blue-400/80 animate-pulse tracking-wider">等待接收端掃描連線...</p>
                </div>

                <!-- 接收者自動接通處理面板 -->
                <div id="joiner-panel" class="hidden flex flex-col items-center space-y-4">
                    <div class="w-10 h-10 rounded-full border-2 border-emerald-400 border-t-transparent animate-spin"></div>
                    <p class="text-xs text-emerald-400/80 animate-pulse tracking-wider">正在進行一鍵握手對接...</p>
                </div>
            </div>

            <!-- 連線狀態指示器 -->
            <div id="connection-status" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-950 border border-slate-900/60">
                <span id="status-indicator" class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span>
                <span id="status-text" class="text-[10px] font-medium tracking-widest text-slate-500">系統未連線</span>
            </div>
        </div>

        <!-- 第二步：檔案選取與傳輸控制 (連線後自動亮起/淡入) -->
        <div id="transfer-panel" class="hidden w-full transition-all duration-500">
            <!-- 拖曳上傳區 -->
            <div id="drop-zone" class="border border-dashed border-slate-800 hover:border-blue-500/50 rounded-2xl p-8 text-center cursor-pointer bg-slate-950/40 transition-all duration-300 group">
                <input type="file" id="file-input" class="hidden" />
                <svg class="w-8 h-8 text-slate-700 group-hover:text-blue-400 mx-auto mb-3 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                <p class="text-xs font-semibold text-slate-400 group-hover:text-slate-200 transition-colors">點擊或拖曳檔案至此</p>
                <p class="text-[9px] text-slate-600 mt-1">本地加密傳輸，不限大小</p>
            </div>

            <!-- 檔案資訊與進度條 -->
            <div id="file-info-container" class="hidden mt-4 space-y-4 bg-slate-950 p-4 rounded-xl border border-slate-900">
                <div class="flex justify-between items-center">
                    <div class="truncate pr-4">
                        <p id="info-file-name" class="font-bold text-xs text-slate-200 truncate max-w-[200px]">檔案名稱.ext</p>
                        <p id="info-file-size" class="text-[10px] text-slate-500">0 Bytes</p>
                    </div>
                    <button id="btn-send" onclick="sendFileChunks()" class="bg-blue-600 hover:bg-blue-500 text-white font-bold text-xs px-4 py-1.5 rounded-lg transition-all shadow-md shadow-blue-600/10">開始發送</button>
                </div>

                <!-- 進度條 -->
                <div class="space-y-1.5">
                    <div class="flex justify-between text-[10px]">
                        <span id="progress-status" class="text-slate-500">準備傳輸</span>
                        <span id="progress-percent" class="font-bold text-blue-400">0%</span>
                    </div>
                    <div class="w-full bg-slate-900 rounded-full h-1 overflow-hidden">
                        <div id="progress-bar" class="bg-gradient-to-r from-blue-500 to-emerald-400 h-1 w-0 transition-all duration-75"></div>
                    </div>
                    <div class="flex justify-between text-[9px] text-slate-600 pt-0.5 font-mono">
                        <span id="transfer-speed">0.00 MB/s</span>
                        <span id="transfer-time">--:--</span>
                    </div>
                </div>
            </div>

            <!-- 接收檔案提示區 -->
            <div id="incoming-file-box" class="hidden mt-4 bg-slate-950 border border-slate-900 p-4 rounded-xl space-y-3">
                <p class="text-xs text-emerald-400 font-semibold flex items-center gap-1.5">
                    <span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-400 animate-ping"></span>
                    正在接收檔案...
                </p>
                <div class="space-y-1.5">
                    <div class="flex justify-between text-[10px]">
                        <span id="recv-file-name" class="text-slate-400 truncate max-w-[200px]">檔案中...</span>
                        <span id="recv-percent" class="font-bold text-emerald-400">0%</span>
                    </div>
                    <div class="w-full bg-slate-900 rounded-full h-1 overflow-hidden">
                        <div id="recv-progress-bar" class="bg-gradient-to-r from-emerald-500 to-teal-400 h-1 w-0"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 自訂通知訊息元件 (Toast) -->
        <div id="alert-toast" class="hidden p-3.5 rounded-xl border bg-slate-950 shadow-2xl flex items-center justify-between text-xs transition-all duration-300">
            <span id="toast-msg">提示訊息</span>
            <button onclick="hideToast()" class="text-slate-500 hover:text-white ml-4 text-[10px] font-bold tracking-wider">關閉</button>
        </div>

    </main>

    <!-- 相機掃描彈窗 (Modal) -->
    <div id="scanner-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-[100] flex items-center justify-center p-4">
        <div class="bg-slate-950 border border-slate-900 rounded-2xl p-5 max-w-sm w-full relative">
            <h3 class="text-sm font-bold mb-3 text-white flex items-center gap-2">
                <span class="relative flex h-1.5 w-1.5">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-emerald-500"></span>
                </span>
                開啟相機對焦中...
            </h3>
            
            <div class="relative w-full aspect-square bg-black rounded-xl overflow-hidden border border-slate-900">
                <video id="scan-video" class="w-full h-full object-cover"></video>
                <canvas id="scan-canvas" class="hidden"></canvas>
                <div class="absolute inset-8 border border-emerald-500/20 rounded-lg pointer-events-none">
                    <div class="absolute top-0 left-0 w-3 h-3 border-t border-l border-emerald-400"></div>
                    <div class="absolute top-0 right-0 w-3 h-3 border-t border-r border-emerald-400"></div>
                    <div class="absolute bottom-0 left-0 w-3 h-3 border-b border-l border-emerald-400"></div>
                    <div class="absolute bottom-0 right-0 w-3 h-3 border-b border-r border-emerald-400"></div>
                    <div class="scan-line w-full h-0.5 bg-gradient-to-r from-transparent via-emerald-400 to-transparent absolute top-0 shadow-[0_0_8px_#10b981]"></div>
                </div>
            </div>

            <button onclick="stopScanner()" class="mt-4 w-full bg-slate-900 hover:bg-slate-800 text-slate-400 hover:text-slate-200 font-bold py-2 rounded-xl text-xs transition">取消</button>
        </div>
    </div>

    <!-- 底部極簡版權 -->
    <footer class="text-center py-6 text-[9px] text-slate-800 tracking-wider font-mono">
        <p>P2P FILE SYSTEM · SECURE DIRECT CONNECTION</p>
    </footer>

    <!-- WebRTC JavaScript 邏輯與修復後的流控實作 -->
    <script>
        let peerConnection = null;
        let dataChannel = null;
        let selectedFile = null;
        let receiveBuffer = [];
        let receivedSize = 0;
        let incomingFileInfo = null;
        
        let roomId = null;
        let isHost = false;
        let answerCheckInterval = null;

        // 相機相關
        let videoStream = null;
        let scanAnimationId = null;

        const rtcConfig = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' }
            ]
        };

        // --- 自動檢測加入 URL ---
        window.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const rId = urlParams.get('room');
            if (rId) {
                roomId = rId;
                isHost = false;
                initJoinerWithRoom();
            }
        });

        function getWorkerUrl() {
            return "https://bobconnect.bobkao0527.workers.dev";
        }

        // --- 自訂 Toast 元件 ---
        function showToast(msg, type = 'info') {
            const toast = document.getElementById('alert-toast');
            const toastMsg = document.getElementById('toast-msg');
            toastMsg.innerText = msg;
            
            toast.className = `fixed bottom-6 right-6 z-50 p-4 rounded-xl border shadow-2xl flex items-center justify-between transition-all duration-300 max-w-sm w-full`;
            if (type === 'success') {
                toast.classList.add('bg-emerald-950/90', 'border-emerald-500/40', 'text-emerald-300');
            } else if (type === 'error') {
                toast.classList.add('bg-rose-950/90', 'border-rose-500/40', 'text-rose-300');
            } else {
                toast.classList.add('bg-slate-900/90', 'border-slate-800', 'text-slate-300');
            }
            toast.classList.remove('hidden');
            
            setTimeout(hideToast, 4000);
        }

        function hideToast() {
            document.getElementById('alert-toast').classList.add('hidden');
        }

        function generateQRCode(canvasId, text) {
            new QRious({
                element: document.getElementById(canvasId),
                value: text,
                size: 200,
                level: 'M'
            });
        }

        // --- 發起者流程 (Host) ---
        async function initHost() {
            isHost = true;
            roomId = Math.random().toString(36).substring(2, 10);

            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('signaling-box').classList.remove('hidden');
            document.getElementById('host-panel').classList.remove('hidden');

            const currentOrigin = window.location.origin + window.location.pathname;
            const joinUrl = `${currentOrigin}?room=${roomId}`;
            document.getElementById('room-url-display').innerText = joinUrl;
            generateQRCode('qr-canvas', joinUrl);

            try {
                peerConnection = new RTCPeerConnection(rtcConfig);

                dataChannel = peerConnection.createDataChannel('fileTransfer', { ordered: true });
                dataChannel.bufferedAmountLowThreshold = 131072; // 初始化 128KB 低水位閥值
                setupDataChannelListeners();

                peerConnection.onicecandidate = async (event) => {
                    if (!event.candidate) {
                        const offer = peerConnection.localDescription;
                        const workerUrl = getWorkerUrl();
                        
                        try {
                            const res = await fetch(`${workerUrl}/room/${roomId}`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ offer })
                            });
                            if (res.ok) {
                                updateStatus('信令伺服器就緒，等候接入', 'yellow');
                                startCheckingForAnswer();
                            } else {
                                throw new Error();
                            }
                        } catch (err) {
                            showToast('無法與信令伺服器同步', 'error');
                        }
                    }
                };

                const offer = await peerConnection.createOffer();
                await peerConnection.setLocalDescription(offer);

                updateStatus('正在同步中轉服務...', 'yellow');

            } catch (e) {
                console.error(e);
                showToast('初始化失敗: ' + e.message, 'error');
            }
        }

        // --- 輪詢檢查接收端 Answer ---
        function startCheckingForAnswer() {
            if (answerCheckInterval) clearInterval(answerCheckInterval);
            const workerUrl = getWorkerUrl();

            answerCheckInterval = setInterval(async () => {
                try {
                    const res = await fetch(`${workerUrl}/room/${roomId}`);
                    if (res.ok) {
                        const data = await res.json();
                        if (data && data.answer) {
                            clearInterval(answerCheckInterval);
                            answerCheckInterval = null;
                            
                            await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer));
                            showToast('成功對齊傳輸描述，建立直連中！', 'success');
                        }
                    }
                } catch (e) {
                    console.error(e);
                }
            }, 1500);
        }

        // --- 接收端：自動對接流程 ---
        async function initJoinerWithRoom() {
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('signaling-box').classList.remove('hidden');
            document.getElementById('joiner-panel').classList.remove('hidden');
            updateStatus('正在提取信令鑰匙...', 'yellow');

            const workerUrl = getWorkerUrl();

            try {
                const res = await fetch(`${workerUrl}/room/${roomId}`);
                if (!res.ok) throw new Error('提取信令失敗');
                const data = await res.json();
                if (!data || !data.offer) throw new Error('連線可能超時或失效，請發起端重新產生');

                peerConnection = new RTCPeerConnection(rtcConfig);

                peerConnection.ondatachannel = (event) => {
                    dataChannel = event.channel;
                    dataChannel.bufferedAmountLowThreshold = 131072; // 設定 128KB 低水位閥值
                    setupDataChannelListeners();
                };

                peerConnection.onicecandidate = async (event) => {
                    if (!event.candidate) {
                        const answer = peerConnection.localDescription;
                        try {
                            const postRes = await fetch(`${workerUrl}/room/${roomId}`, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ answer })
                            });
                            if (postRes.ok) {
                                updateStatus('密鑰交換完畢，等待通道開放', 'yellow');
                            }
                        } catch (err) {
                            showToast('回應金鑰失敗', 'error');
                        }
                    }
                };

                await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);

            } catch (e) {
                showToast(e.message, 'error');
                updateStatus('連線建立中斷', 'red');
            }
        }

        // --- 相機掃描控制 ---
        async function startScanner() {
            const modal = document.getElementById('scanner-modal');
            const video = document.getElementById('scan-video');

            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = videoStream;
                video.setAttribute('playsinline', true);
                video.play();
                
                modal.classList.remove('hidden');
                scanAnimationId = requestAnimationFrame(tickScanner);
            } catch (e) {
                showToast('無法開啟相機，請檢查權限設定', 'error');
            }
        }

        function stopScanner() {
            const modal = document.getElementById('scanner-modal');
            modal.classList.add('hidden');
            if (scanAnimationId) cancelAnimationFrame(scanAnimationId);
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
                videoStream = null;
            }
        }

        function tickScanner() {
            const video = document.getElementById('scan-video');
            const canvas = document.getElementById('scan-canvas');
            const context = canvas.getContext('2d');

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert",
                });
                
                if (code) {
                    stopScanner();
                    try {
                        const url = new URL(code.data);
                        const rId = url.searchParams.get('room');
                        if (rId) {
                            showToast('解鎖對齊成功！一鍵握手中...', 'success');
                            roomId = rId;
                            isHost = false;
                            initJoinerWithRoom();
                        } else {
                            showToast('無效的對接二維碼', 'error');
                        }
                    } catch (e) {
                        showToast('讀取失敗：無效格式', 'error');
                    }
                    return;
                }
            }
            scanAnimationId = requestAnimationFrame(tickScanner);
        }

        // --- 設定 DataChannel 監聽器 ---
        function setupDataChannelListeners() {
            dataChannel.onopen = () => {
                updateStatus('P2P 直連已開通 (加密)', 'green');
                showToast('通道對打洞成功！安全極速 P2P 連結就緒。', 'success');
                
                // 巧妙淡出 Step 1 的所有按鈕與面板，直接展現檔案傳輸模組
                document.getElementById('setup-view').classList.add('hidden');
                document.getElementById('signaling-box').classList.add('hidden');
                
                const tfPanel = document.getElementById('transfer-panel');
                tfPanel.classList.remove('hidden');
                tfPanel.style.opacity = '1';
            };

            dataChannel.onclose = () => {
                updateStatus('連線已被安全釋放', 'red');
                showToast('連結已釋放斷開', 'error');
                document.getElementById('transfer-panel').classList.add('hidden');
                document.getElementById('setup-view').classList.remove('hidden');
            };

            dataChannel.onmessage = (event) => {
                handleIncomingData(event.data);
            };
        }

        // --- 接收端：處理接收資料流 ---
        function handleIncomingData(data) {
            if (typeof data === 'string') {
                try {
                    const message = JSON.parse(data);
                    
                    if (message.type === 'file-meta') {
                        incomingFileInfo = {
                            name: message.name,
                            size: message.size
                        };
                        receiveBuffer = [];
                        receivedSize = 0;

                        document.getElementById('incoming-file-box').classList.remove('hidden');
                        document.getElementById('recv-file-name').innerText = incomingFileInfo.name;
                        document.getElementById('recv-percent').innerText = '0%';
                        document.getElementById('recv-progress-bar').style.width = '0%';
                    } else if (message.type === 'file-end') {
                        const blob = new Blob(receiveBuffer);
                        const url = URL.createObjectURL(blob);
                        
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = incomingFileInfo.name;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);

                        document.getElementById('recv-percent').innerText = '100% (已自動下載)';
                        document.getElementById('recv-progress-bar').style.width = '100%';
                        document.getElementById('recv-progress-bar').className = "bg-emerald-500 h-1 w-full";
                        showToast(`「${incomingFileInfo.name}」下載成功！`, 'success');
                    }
                } catch (e) {
                    console.error(e);
                }
            } else {
                receiveBuffer.push(data);
                receivedSize += data.byteLength;

                if (incomingFileInfo) {
                    const percent = Math.min(100, Math.round((receivedSize / incomingFileInfo.size) * 100));
                    document.getElementById('recv-percent').innerText = `${percent}%`;
                    document.getElementById('recv-progress-bar').style.width = `${percent}%`;
                }
            }
        }

        // --- 發送端：黃金級流控非同步切片傳輸 (解決 10% 凍結死結) ---
        function sendFileChunks() {
            if (!selectedFile || !dataChannel || dataChannel.readyState !== 'open') {
                showToast('通道尚未連線或未選擇檔案', 'error');
                return;
            }

            const btnSend = document.getElementById('btn-send');
            if (btnSend) {
                btnSend.disabled = true;
                btnSend.classList.add('opacity-40', 'cursor-not-allowed');
            }

            // 發送 Meta 宣告
            const meta = {
                type: 'file-meta',
                name: selectedFile.name,
                size: selectedFile.size
            };
            dataChannel.send(JSON.stringify(meta));

            const chunkSize = 16384; // 最穩定的 16KB 標準切片
            let offset = 0;
            const fileReader = new FileReader();
            const startTime = Date.now();

            document.getElementById('progress-status').innerText = '發送中...';

            // 強制設定低水位，確保當快取清空到 128KB 以下時，才會觸發 low 事件
            dataChannel.bufferedAmountLowThreshold = 131072;

            const readNextChunk = () => {
                if (offset >= selectedFile.size) {
                    dataChannel.send(JSON.stringify({ type: 'file-end' }));
                    document.getElementById('progress-status').innerText = '傳送完畢';
                    showToast('檔案已完全投遞給接收端！', 'success');
                    if (btnSend) {
                        btnSend.disabled = false;
                        btnSend.classList.remove('opacity-40', 'cursor-not-allowed');
                    }
                    return;
                }

                const slice = selectedFile.slice(offset, offset + chunkSize);
                fileReader.readAsArrayBuffer(slice);
            };

            fileReader.onload = (e) => {
                const buffer = e.target.result;
                dataChannel.send(buffer);
                offset += buffer.byteLength;

                // 即時 UI 計算
                const percent = Math.min(100, Math.round((offset / selectedFile.size) * 100));
                document.getElementById('progress-percent').innerText = `${percent}%`;
                document.getElementById('progress-bar').style.width = `${percent}%`;

                const elapsedTime = (Date.now() - startTime) / 1000;
                const speedBytes = offset / elapsedTime;
                const speedMB = (speedBytes / (1024 * 1024)).toFixed(2);
                document.getElementById('transfer-speed').innerText = `${speedMB} MB/s`;

                if (speedBytes > 0) {
                    const remainingBytes = selectedFile.size - offset;
                    const remainingSeconds = Math.max(0, Math.round(remainingBytes / speedBytes));
                    const mins = Math.floor(remainingSeconds / 60);
                    const secs = remainingSeconds % 60;
                    document.getElementById('transfer-time').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                }

                // 【極其重要：流控阻斷與調度保護】
                // 如果當前佇列快取已超過 256KB，則強制阻塞下一次檔案讀取，直到緩衝下降至 128KB 觸發事件
                if (dataChannel.bufferedAmount > 262144) {
                    dataChannel.onbufferedamountlow = () => {
                        dataChannel.onbufferedamountlow = null; // 即刻清空監聽，避免重複回呼
                        readNextChunk();
                    };
                } else {
                    // 若在安全水位下，則藉由微小的非同步延遲調度 readNextChunk()。
                    // 這樣做能將線程歸還給瀏覽器的 UI 渲染引擎（Event Loop），防止 JS 連續阻塞，完全杜絕 10% 卡死問題
                    setTimeout(readNextChunk, 0);
                }
            };

            // 開始安全讀取發送
            readNextChunk();
        }

        // --- 拖曳與選擇檔案相關 UI 事件 ---
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');

        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('border-blue-500', 'bg-slate-950/90');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('border-blue-500', 'bg-slate-950/90');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-slate-950/90');
            if (e.dataTransfer.files.length > 0) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        function handleFileSelect(file) {
            selectedFile = file;
            
            let sizeStr = file.size + ' Bytes';
            if (file.size > 1024 * 1024 * 1024) {
                sizeStr = (file.size / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
            } else if (file.size > 1024 * 1024) {
                sizeStr = (file.size / (1024 * 1024)).toFixed(2) + ' MB';
            } else if (file.size > 1024) {
                sizeStr = (file.size / 1024).toFixed(2) + ' KB';
            }

            document.getElementById('file-info-container').classList.remove('hidden');
            document.getElementById('info-file-name').innerText = file.name;
            document.getElementById('info-file-size').innerText = sizeStr;
            
            document.getElementById('progress-status').innerText = '隨時可以發送';
            document.getElementById('progress-percent').innerText = '0%';
            document.getElementById('progress-bar').style.width = '0%';
            document.getElementById('transfer-speed').innerText = `0.00 MB/s`;
            document.getElementById('transfer-time').innerText = `--:--`;
        }

        // --- 狀態燈與文字更新 ---
        function updateStatus(text, color) {
            const indicator = document.getElementById('status-indicator');
            const statusText = document.getElementById('status-text');

            statusText.innerText = text;
            
            indicator.className = "w-1.5 h-1.5 rounded-full";
            if (color === 'green') {
                indicator.classList.add('bg-emerald-500', 'animate-pulse');
                statusText.className = "text-[10px] font-medium tracking-widest text-emerald-400";
            } else if (color === 'yellow') {
                indicator.classList.add('bg-yellow-500', 'animate-pulse');
                statusText.className = "text-[10px] font-medium tracking-widest text-yellow-400";
            } else {
                indicator.classList.add('bg-red-500');
                statusText.className = "text-[10px] font-medium tracking-widest text-red-400";
            }
        }
    </script>
</body>
</html>
